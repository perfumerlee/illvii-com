<body><main><a href="../">← 주문 페이지로 돌아가기</a><h1>일비 주문 안내</h1>
<section><h2>1. 제품 선택</h2><p>원하는 향과 용량, 수량을 선택한 뒤 장바구니에 담아주세요.</p></section>
<section><h2>2. 주문 정보 입력</h2><p>주문자명, 연락처, 배송지 주소, 배송 메모 및 요청사항을 입력합니다.</p></section>
<section><h2>3. 입금 안내</h2><p>주문 접수 후 일비가 내용을 확인하고 입금 정보를 안내합니다. 주문 완료 팝업에서도 계좌 정보를 확인할 수 있습니다.</p></section>
<section><h2>4. 제작 및 발송</h2><p>입금 확인 후 제품 제작 및 발송이 진행됩니다. 배송 안내는 주문 시 입력한 연락처를 기준으로 진행됩니다.</p></section>
</main></body></html>
